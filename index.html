<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC おみくじ - Omikuji</title>
  <!-- 和風フォント（明朝体）の読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* 全体の設定 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Serif JP', serif;
      background-color: #2c3e50; /* 外側の背景は落ち着いた紺色 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* おみくじの紙（枠） */
    .omikuji-paper {
      background-color: #fffdfa; /* 和紙のようなクリーム色 */
      height: 85vh;
      width: 90vw;
      max-width: 600px;
      padding: 30px 20px;
      box-sizing: border-box;
      border: 3px solid #d34b31; 
      outline: 1px solid #d34b31;
      outline-offset: -8px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      position: relative;
      color: #d34b31;
      writing-mode: vertical-rl;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .content-area {
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s ease;
      display: flex;
      align-items: flex-start;
      align-content: flex-start;
      flex-wrap: wrap;
    }

    /* 運勢エリア */
    .unsei-header {
      margin-left: 30px;
      border-left: 1px solid rgba(211, 75, 49, 0.4);
      padding-left: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .unsei-label {
      font-size: 1.2rem;
      letter-spacing: 0.5em;
      margin-bottom: 20px;
    }

    .unsei-value {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.2;
    }

    /* 運勢の英語 */
    .en-fortune {
      font-size: 1rem;
      font-weight: 400;
      margin-top: 10px;
      text-orientation: mixed; /* 英字を自然な向きに */
    }

    /* 各項目のリスト */
    .detail-item {
      margin-left: 20px;
      font-size: 1.1rem;
    }

    .detail-label {
      font-weight: 700;
      display: inline-block;
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    .detail-text {
      display: inline-block;
      line-height: 1.5;
    }

    /* 各項目の英語 */
    .en-text {
      font-size: 0.65rem;
      margin-right: 5px; /* 縦書き時の行間 */
      opacity: 0.8;
      text-orientation: mixed;
    }

    .spacer {
      margin-left: 25px;
    }

    /* メッセージエリア */
    .message-area {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.6;
      margin-left: 30px;
      padding-left: 20px;
      border-left: 1px solid rgba(211, 75, 49, 0.4);
    }

    /* メッセージの英語 */
    .message-en {
      font-size: 0.8rem;
      font-weight: 400;
      margin-right: 10px;
      opacity: 0.8;
      text-orientation: mixed;
    }

    /* ローディングとフェード */
    .loader {
      border: 3px solid rgba(211, 75, 49, 0.2);
      border-top: 3px solid #d34b31;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      position: absolute;
      top: calc(50% - 20px);
      left: calc(50% - 20px);
      z-index: 10;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fade { opacity: 0; }
    
    /* ボタン */
    .btn {
      position: absolute;
      left: 20px;
      bottom: 20px;
      writing-mode: horizontal-tb; /* ボタンは横書き */
      background: #d34b31;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif;
      box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3);
      transition: all 0.3s ease;
      z-index: 100;
    }
    .btn:active { transform: translateY(2px); }
  </style>
</head>
<body>

  <div class="omikuji-paper">
    <div class="loader" id="loader"></div>
    
    <div class="content-area" id="content-area">
      
      <!-- 運勢 -->
      <div class="unsei-header">
        <span class="unsei-label">運勢</span>
        <span class="unsei-value" id="unsei"></span>
      </div>

      <!-- 基本項目 -->
      <div class="detail-item"><span class="detail-label">願事</span><span class="detail-text" id="negaigoto"></span></div>
      <div class="detail-item"><span class="detail-label">恋愛</span><span class="detail-text" id="renai"></span></div>
      <div class="detail-item"><span class="detail-label">待人</span><span class="detail-text" id="machibito"></span></div>
      <div class="detail-item"><span class="detail-label">商売</span><span class="detail-text" id="shoubai"></span></div>
      <div class="detail-item"><span class="detail-label">旅行</span><span class="detail-text" id="ryokou"></span></div>
      <div class="detail-item"><span class="detail-label">学問</span><span class="detail-text" id="gakumon"></span></div>
      <div class="detail-item"><span class="detail-label">病気</span><span class="detail-text" id="byouki"></span></div>
      
      <div class="spacer"></div>
      
      <!-- 開運 -->
      <div class="detail-item"><span class="detail-label">開運物</span><span class="detail-text" id="kaiun_mono"></span></div>
      <div class="detail-item"><span class="detail-label">開運場所</span><span class="detail-text" id="kaiun_basho"></span></div>
      <div class="detail-item"><span class="detail-label">開運人物</span><span class="detail-text" id="kaiun_jinbutsu"></span></div>
      <div class="detail-item"><span class="detail-label">開運色</span><span class="detail-text" id="kaiun_iro"></span></div>
      
      <div class="spacer"></div>
      
      <!-- 不運 -->
      <div class="detail-item"><span class="detail-label">不運物</span><span class="detail-text" id="fuun_mono"></span></div>
      <div class="detail-item"><span class="detail-label">不運場所</span><span class="detail-text" id="fuun_basho"></span></div>
      <div class="detail-item"><span class="detail-label">不運人物</span><span class="detail-text" id="fuun_jinbutsu"></span></div>

      <!-- 一言メッセージ -->
      <div class="message-area" id="message"></div>

    </div>
    
    <!-- ボタンにも英語を併記 -->
    <button class="btn" id="btn" onclick="fetchOmikuji()" style="visibility: hidden;">引き直す (Draw again)</button>
  </div>

  <script>
    // ★↓↓↓ ここにご自身のGASのURLを貼り付けてください ↓↓↓★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzCda4V2uK3uPFeCWajXyCBRcEbKwrapneg4vTmBhmtOt4L89pULGOpyPST1jTb73u-Yg/exec";

    window.onload = function() {
      fetchOmikuji();
    };

    function fetchOmikuji() {
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      const contentArea = document.getElementById('content-area');

      contentArea.classList.add('fade');
      btn.style.visibility = 'hidden';
      loader.style.display = 'block';

      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => response.json())
        .then(data => {
          setTimeout(() => {
            
            // 運勢とメッセージ（日本語の下に英語を追加）
            document.getElementById('unsei').innerHTML = `${data.fortuneJP}<br><span class="en-fortune">${data.fortuneEN}</span>`;
            document.getElementById('message').innerHTML = `${data.messageJP}<br><span class="message-en">${data.messageEN}</span>`;
            
            // その他の項目をループで一気に処理（日本語の下に英語を追加）
            const items =['negaigoto', 'renai', 'machibito', 'shoubai', 'ryokou', 'gakumon', 'byouki', 'kaiun_mono', 'kaiun_basho', 'kaiun_jinbutsu', 'kaiun_iro', 'fuun_mono', 'fuun_basho', 'fuun_jinbutsu'];
            
            items.forEach(item => {
              document.getElementById(item).innerHTML = `${data[item+'JP']}<br><span class="en-text">${data[item+'EN']}</span>`;
            });

            contentArea.classList.remove('fade');
            loader.style.display = 'none';
            btn.style.visibility = 'visible';
          }, 400);
        })
        .catch(error => {
          document.getElementById('message').innerHTML = `通信エラーです。<br><span class="message-en">Network error.</span>`;
          contentArea.classList.remove('fade');
          loader.style.display = 'none';
          btn.style.visibility = 'visible';
        });
    }
  </script>
</body>
</html>
