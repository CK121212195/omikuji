<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC おみくじ - Omikuji</title>

  <!-- Googleアナリティクス -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5NZLZJW7FC"></script>
  <script>
    window.dataLayer = window.dataLayer ||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5NZLZJW7FC');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; padding: 0; font-family: 'Noto Serif JP', serif; background-color: #2c3e50;
      display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box;
    }

    /* --- トップ画面 --- */
    .start-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #fdfbf6; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 200;
      color: #d34b31; transition: opacity 0.5s ease;
    }
    .circle-logo {
      font-size: 3.5rem; margin-bottom: 25px; width: 110px; height: 110px;
      border: 5px solid #d34b31; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; background-color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .start-title {
      font-size: 3.8rem; font-weight: 700; letter-spacing: 0.1em;
      margin-bottom: 15px; text-align: center; line-height: 1.2;
    }
    .wave-line { font-size: 1.5rem; letter-spacing: 0.2em; margin-bottom: 40px; opacity: 0.8; }
    
    .start-btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none;
      padding: 15px 50px; border-radius: 40px; font-size: 1.5rem; font-family: 'Noto Serif JP', serif; 
      box-shadow: 0 8px 20px rgba(211, 75, 49, 0.4); cursor: pointer; transition: all 0.3s ease; 
      font-weight: bold; line-height: 1.4; text-align: center;
    }
    .start-btn:active { transform: translateY(4px); box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3); }

    /* --- おみくじ結果画面 --- */
    .omikuji-paper {
      background-color: #fffdfa; width: 92vw; max-width: 500px; margin: 20px 0; padding: 20px 10px;
      box-sizing: border-box; position: relative; color: #d34b31; border: 2px solid #d34b31;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3); display: none; flex-direction: column;
    }
    .omikuji-paper::before {
      content: ""; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 1px solid #d34b31; pointer-events: none;
    }
    .content-area { display: flex; flex-direction: column; flex: 1; opacity: 1; transition: opacity 0.8s ease; }
    .fade { opacity: 0 !important; }

    /* 上部：メッセージ */
    .top-section { writing-mode: vertical-rl; width: 100%; min-height: 400px; padding: 30px 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
    .message-text { font-size: 1.8rem; font-weight: 700; line-height: 1.8; letter-spacing: 0.1em; }
    .message-en { font-size: 1.1rem; font-weight: 400; margin-right: 18px; opacity: 0.85; text-orientation: mixed; }

    /* 中央：運勢 */
    .middle-section { margin: 0 15px; padding: 15px 10px; border-top: 1px solid #d34b31; border-bottom: 1px solid #d34b31; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .unsei-label { font-size: 1.5rem; letter-spacing: 0.3em; font-weight: 700; }
    .unsei-mark { width: 42px; height: 42px; border: 2px solid #d34b31; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; }
    .unsei-value { font-size: 2.8rem; font-weight: 700; letter-spacing: 0.1em; text-align: right; }
    .unsei-en { font-size: 1.2rem; font-weight: 400; opacity: 0.85; display: block; }

    /* 下部：詳細項目 */
    .bottom-section { display: flex; flex-direction: row-reverse; flex-wrap: wrap; padding: 20px 5px; width: 100%; box-sizing: border-box; }
    .detail-item { writing-mode: vertical-rl; height: 380px; margin: 0 10px 30px 10px; }
    .detail-title { font-weight: 700; font-size: 1.5rem; margin-bottom: 12px; }
    .title-en { font-size: 0.9rem; font-weight: 400; opacity: 0.85; display: block; margin-top: 6px; text-orientation: mixed; }
    .detail-desc { font-size: 1.2rem; line-height: 1.6; }
    .detail-en { font-size: 0.9rem; line-height: 1.4; margin-right: 12px; opacity: 0.85; text-orientation: mixed; }

    .btn-container { text-align: center; margin-top: 15px; margin-bottom: 15px; z-index: 100; }
    .btn { background: #d34b31; color: white; border: none; padding: 15px 35px; border-radius: 30px; cursor: pointer; font-family: 'Noto Serif JP', serif; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3); transition: all 0.3s ease; visibility: hidden; }
    .btn:active { transform: translateY(2px); }
    .loader { border: 3px solid rgba(211, 75, 49, 0.2); border-top: 3px solid #d34b31; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none; }
    @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ✨デザイン変更したトップ画面 -->
  <div class="start-screen" id="start-screen">
    <div class="circle-logo">⛩️</div>
    <div class="start-title">
      おみくじ<br>
      <span style="font-size: 2rem; font-weight: normal; letter-spacing: 0.05em;">"Omikuji"</span>
    </div>
    <div class="wave-line">〜〜〜〜〜〜〜</div>
    
    <button class="start-btn" onclick="drawFortune()">
      おみくじをひく<br><span style="font-size: 0.9rem; font-weight: normal;">Draw a fortune</span>
    </button>
  </div>

  <div class="loader" id="loader"></div>

  <div class="omikuji-paper" id="result-screen">
    <div class="content-area fade" id="content-area">
      
      <div class="top-section"><div class="message-text" id="message"></div></div>
      <div class="middle-section">
        <div class="unsei-label">運勢<br><span style="font-size:0.9rem; font-weight:normal; opacity:0.85;">Fortune</span></div>
        <div class="unsei-mark">⛩️</div><div class="unsei-value" id="unsei"></div>
      </div>
      
      <div class="bottom-section">
        <div class="detail-item"><div class="detail-title">願事<br><span class="title-en">Wishes</span></div><div class="detail-desc" id="negaigoto"></div></div>
        <div class="detail-item"><div class="detail-title">恋愛<br><span class="title-en">Romance</span></div><div class="detail-desc" id="renai"></div></div>
        <div class="detail-item"><div class="detail-title">待人<br><span class="title-en">Waiting</span></div><div class="detail-desc" id="machibito"></div></div>
        <div class="detail-item"><div class="detail-title">商売<br><span class="title-en">Business</span></div><div class="detail-desc" id="shoubai"></div></div>
        <div class="detail-item"><div class="detail-title">旅行<br><span class="title-en">Travel</span></div><div class="detail-desc" id="ryokou"></div></div>
        <div class="detail-item"><div class="detail-title">学問<br><span class="title-en">Study</span></div><div class="detail-desc" id="gakumon"></div></div>
        <div class="detail-item"><div class="detail-title">病気<br><span class="title-en">Health</span></div><div class="detail-desc" id="byouki"></div></div>
        
        <div class="detail-item"><div class="detail-title">開運物<br><span class="title-en">Lucky Item</span></div><div class="detail-desc" id="kaiun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">開運場所<br><span class="title-en">Lucky Place</span></div><div class="detail-desc" id="kaiun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">開運人物<br><span class="title-en">Lucky Person</span></div><div class="detail-desc" id="kaiun_jinbutsu"></div></div>
        <div class="detail-item"><div class="detail-title">開運色<br><span class="title-en">Lucky Color</span></div><div class="detail-desc" id="kaiun_iro"></div></div>
        
        <div class="detail-item"><div class="detail-title">不運物<br><span class="title-en">Unlucky Item</span></div><div class="detail-desc" id="fuun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">不運場所<br><span class="title-en">Unlucky Place</span></div><div class="detail-desc" id="fuun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">不運人物<br><span class="title-en">Unlucky Person</span></div><div class="detail-desc" id="fuun_jinbutsu"></div></div>
      </div>
    </div>
    <div class="btn-container"><button class="btn" id="btn" onclick="redrawFortune()">引き直す (Draw again)</button></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzCda4V2uK3uPFeCWajXyCBRcEbKwrapneg4vTmBhmtOt4L89pULGOpyPST1jTb73u-Yg/exec";
    let preloadedData = null; let fetchPromise = null;

    window.onload = function() {
      fetchPromise = fetch(GAS_URL, { redirect: 'follow' })
        .then(response => response.json())
        .then(data => { preloadedData = data; return data; })
        .catch(error => { console.error(error); return null; });
    };

    function drawFortune() {
      const startScreen = document.getElementById('start-screen');
      const resultScreen = document.getElementById('result-screen');
      const loader = document.getElementById('loader');

      startScreen.style.opacity = '0';
      setTimeout(() => {
        startScreen.style.display = 'none'; resultScreen.style.display = 'flex';
        if (preloadedData) { renderData(preloadedData); } 
        else {
          loader.style.display = 'block';
          fetchPromise.then(data => { if(data) renderData(data); else showError(); });
        }
      }, 400);
    }

    function redrawFortune() {
      const contentArea = document.getElementById('content-area');
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btn');

      contentArea.classList.add('fade'); btn.style.visibility = 'hidden'; loader.style.display = 'block';

      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => response.json())
        .then(data => { setTimeout(() => renderData(data), 400); })
        .catch(error => showError());
    }

    function renderData(data) {
      document.getElementById('unsei').innerHTML = `${data.fortuneJP}<br><span class="unsei-en">${data.fortuneEN}</span>`;
      document.getElementById('message').innerHTML = `${data.messageJP}<br><span class="message-en">${data.messageEN}</span>`;
      
      const items =['negaigoto', 'renai', 'machibito', 'shoubai', 'ryokou', 'gakumon', 'byouki', 'kaiun_mono', 'kaiun_basho', 'kaiun_jinbutsu', 'kaiun_iro', 'fuun_mono', 'fuun_basho', 'fuun_jinbutsu'];
      items.forEach(item => { document.getElementById(item).innerHTML = `${data[item+'JP']}<br><span class="detail-en">${data[item+'EN']}</span>`; });
      
      const contentArea = document.getElementById('content-area');
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btn');
      
      contentArea.classList.remove('fade'); loader.style.display = 'none'; btn.style.visibility = 'visible';
      window.scrollTo(0, 0);
    }

    function showError() {
      const contentArea = document.getElementById('content-area');
      const loader = document.getElementById('loader');
      const btn = document.getElementById('btn');
      document.getElementById('message').innerHTML = `通信エラーが発生しました。<br><span class="message-en">Network error. Please try again.</span>`;
      contentArea.classList.remove('fade'); loader.style.display = 'none'; btn.style.visibility = 'visible';
    }
  </script>
</body>
</html>
