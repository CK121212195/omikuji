<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5NZLZJW7FC"></script>
  <script>
    window.dataLayer = window.dataLayer ||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-5NZLZJW7FC');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC おみくじ - Omikuji</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 20px 0;
      font-family: 'Noto Serif JP', serif;
      background-color: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .omikuji-paper {
      background-color: #fffdfa;
      width: 92vw;
      max-width: 500px;
      padding: 20px 10px;
      box-sizing: border-box;
      position: relative;
      color: #d34b31;
      border: 2px solid #d34b31;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    .omikuji-paper::before {
      content: "";
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 1px solid #d34b31;
      pointer-events: none;
    }

    .content-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      opacity: 1;
      transition: opacity 0.8s ease;
    }
    .fade { opacity: 0 !important; }

    /* 上部：メッセージ */
    .top-section {
      writing-mode: vertical-rl;
      width: 100%;
      min-height: 330px;
      padding: 30px;
      box-sizing: border-box;
      display: flex;
      align-items: center; 
      justify-content: center; 
    }
    .message-text {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.8;
      letter-spacing: 0.1em;
    }
    .message-en {
      font-size: 0.85rem;
      font-weight: 400;
      margin-right: 15px;
      opacity: 0.8;
      text-orientation: mixed;
    }

    /* 中央：運勢 */
    .middle-section {
      margin: 0 15px;
      padding: 15px 10px;
      border-top: 1px solid #d34b31;
      border-bottom: 1px solid #d34b31;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .unsei-label {
      font-size: 1.3rem;
      letter-spacing: 0.3em;
      font-weight: 700;
    }
    .unsei-mark {
      width: 36px;
      height: 36px;
      border: 2px solid #d34b31;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
    }
    .unsei-value {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-align: right;
    }
    .unsei-en {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.8;
      display: block;
    }

    /* 下部：詳細項目 */
    .bottom-section {
      display: flex;
      flex-direction: row-reverse;
      flex-wrap: wrap;
      padding: 20px 5px;
      width: 100%;
      box-sizing: border-box;
    }
    .detail-item {
      writing-mode: vertical-rl;
      height: 280px; /* タイトルの英語が入る分、少し高くしました */
      margin: 0 8px 25px 8px;
    }
    .detail-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    
    /* ★新しく追加：タイトルの英語用CSS */
    .title-en {
      font-size: 0.65rem;
      font-weight: 400;
      opacity: 0.8;
      display: block;
      margin-top: 4px;
      text-orientation: mixed;
    }

    .detail-desc {
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .detail-en {
      font-size: 0.65rem;
      line-height: 1.3;
      margin-right: 8px;
      opacity: 0.7;
      text-orientation: mixed;
    }

    /* ボタンとローダー */
    .btn-container { text-align: center; margin-top: 10px; margin-bottom: 10px; z-index: 100; }
    .btn {
      background: #d34b31; color: white; border: none; padding: 12px 30px;
      border-radius: 25px; cursor: pointer; font-family: 'Noto Serif JP', serif;
      font-size: 1rem; box-shadow: 0 4px 10px rgba(211, 75, 49, 0.3); transition: all 0.3s ease;
      visibility: hidden;
    }
    .btn:active { transform: translateY(2px); }
    .loader {
      border: 3px solid rgba(211, 75, 49, 0.2); border-top: 3px solid #d34b31;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none;
    }
    @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loader" id="loader"></div>

  <div class="omikuji-paper">
    <div class="content-area fade" id="content-area">
      
      <div class="top-section">
        <div class="message-text" id="message"></div>
      </div>
      
      <div class="middle-section">
        <div class="unsei-label">運勢<br><span style="font-size:0.6rem; font-weight:normal; opacity:0.8;">Fortune</span></div>
        <div class="unsei-mark">⛩️</div>
        <div class="unsei-value" id="unsei"></div>
      </div>
      
      <!-- ★ここにタイトルの英訳（Wishesなど）を追加しました！ -->
      <div class="bottom-section">
        <div class="detail-item"><div class="detail-title">願事<br><span class="title-en">Wishes</span></div><div class="detail-desc" id="negaigoto"></div></div>
        <div class="detail-item"><div class="detail-title">恋愛<br><span class="title-en">Romance</span></div><div class="detail-desc" id="renai"></div></div>
        <div class="detail-item"><div class="detail-title">待人<br><span class="title-en">Waiting</span></div><div class="detail-desc" id="machibito"></div></div>
        <div class="detail-item"><div class="detail-title">商売<br><span class="title-en">Business</span></div><div class="detail-desc" id="shoubai"></div></div>
        <div class="detail-item"><div class="detail-title">旅行<br><span class="title-en">Travel</span></div><div class="detail-desc" id="ryokou"></div></div>
        <div class="detail-item"><div class="detail-title">学問<br><span class="title-en">Study</span></div><div class="detail-desc" id="gakumon"></div></div>
        <div class="detail-item"><div class="detail-title">病気<br><span class="title-en">Health</span></div><div class="detail-desc" id="byouki"></div></div>
        
        <div class="detail-item"><div class="detail-title">開運物<br><span class="title-en">Lucky Item</span></div><div class="detail-desc" id="kaiun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">開運場所<br><span class="title-en">Lucky Place</span></div><div class="detail-desc" id="kaiun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">開運人物<br><span class="title-en">Lucky Person</span></div><div class="detail-desc" id="kaiun_jinbutsu"></div></div>
        <div class="detail-item"><div class="detail-title">開運色<br><span class="title-en">Lucky Color</span></div><div class="detail-desc" id="kaiun_iro"></div></div>
        
        <div class="detail-item"><div class="detail-title">不運物<br><span class="title-en">Unlucky Item</span></div><div class="detail-desc" id="fuun_mono"></div></div>
        <div class="detail-item"><div class="detail-title">不運場所<br><span class="title-en">Unlucky Place</span></div><div class="detail-desc" id="fuun_basho"></div></div>
        <div class="detail-item"><div class="detail-title">不運人物<br><span class="title-en">Unlucky Person</span></div><div class="detail-desc" id="fuun_jinbutsu"></div></div>
      </div>

    </div>
    
    <div class="btn-container">
      <button class="btn" id="btn" onclick="fetchOmikuji()">引き直す (Draw again)</button>
    </div>
  </div>

  <script>
    // GASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzCda4V2uK3uPFeCWajXyCBRcEbKwrapneg4vTmBhmtOt4L89pULGOpyPST1jTb73u-Yg/exec";

    window.onload = function() {
      fetchOmikuji();
    };

    function fetchOmikuji() {
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      const contentArea = document.getElementById('content-area');

      contentArea.classList.add('fade');
      btn.style.visibility = 'hidden';
      loader.style.display = 'block';

      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => response.json())
        .then(data => {
          setTimeout(() => {
            document.getElementById('unsei').innerHTML = `${data.fortuneJP}<br><span class="unsei-en">${data.fortuneEN}</span>`;
            document.getElementById('message').innerHTML = `${data.messageJP}<br><span class="message-en">${data.messageEN}</span>`;
            
            const items =['negaigoto', 'renai', 'machibito', 'shoubai', 'ryokou', 'gakumon', 'byouki', 'kaiun_mono', 'kaiun_basho', 'kaiun_jinbutsu', 'kaiun_iro', 'fuun_mono', 'fuun_basho', 'fuun_jinbutsu'];
            
            items.forEach(item => {
              document.getElementById(item).innerHTML = `${data[item+'JP']}<br><span class="detail-en">${data[item+'EN']}</span>`;
            });
            
            contentArea.classList.remove('fade');
            loader.style.display = 'none';
            btn.style.visibility = 'visible';
            window.scrollTo(0, 0);
          }, 400);
        })
        .catch(error => {
          document.getElementById('message').innerHTML = `通信エラーが発生しました。<br><span class="message-en">Network error. Please try again.</span>`;
          contentArea.classList.remove('fade');
          loader.style.display = 'none';
          btn.style.visibility = 'visible';
        });
    }
  </script>
</body>
</html>
